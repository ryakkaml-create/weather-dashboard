<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard Pro</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="top-bar">
            <button id="themeToggle">🌙</button>
        </div>

        <div class="weather-card glass">

            <h1>Weather Dashboard</h1>

            <div class="search-box">
                <input id="cityInput" placeholder="Enter city">
                <button id="searchBtn">Search</button>
            </div>

            <button id="locationBtn">📍 Use My Location</button>

            <div id="loader" class="loader hidden"></div>

            <div id="message"></div>

            <div id="weatherResult" class="hidden">

                <h2 id="cityName"></h2>
                <img id="weatherIcon">

                <p id="temperature"></p>
                <p id="humidity"></p>
                <p id="wind"></p>
                <p id="condition"></p>
            </div>

        </div>

        <h2 class="forecast-title">5-Day Forecast</h2>
        <div id="forecast" class="forecast"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
